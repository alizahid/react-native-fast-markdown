buildscript {
  ext.safeExtGet = {prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'com.facebook.react'

android {
  namespace "com.markdown"

  compileSdkVersion safeExtGet('compileSdkVersion', 35)

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 24)
    targetSdkVersion safeExtGet('targetSdkVersion', 35)

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++17 -O2 -frtti -fexceptions"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "src/main/jni/CMakeLists.txt"
    }
  }

  sourceSets {
    main {
      java.srcDirs = ['src/main/java', "${buildDir}/generated/source/codegen/java"]
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:${safeExtGet('kotlinVersion', '1.9.22')}"
}

// After codegen generates the default ComponentDescriptors.h, replace
// it with ours which injects a custom shadow node with measureContent.
// This is the only reliable way because the codegen cmake's own include
// path always takes precedence over the library's INTERFACE include dirs.
tasks.configureEach { task ->
  if (task.name.startsWith("generateCodegen")) {
    task.doLast {
      def src = file("src/main/jni/react/renderer/components/MarkdownViewSpec/ComponentDescriptors.h")
      def dst = file("${buildDir}/generated/source/codegen/jni/react/renderer/components/MarkdownViewSpec/ComponentDescriptors.h")
      if (src.exists() && dst.parentFile.exists()) {
        dst.text = src.text
        // Also copy the shadow node header next to the descriptor
        def shadowSrc = file("src/main/jni/MarkdownViewShadowNode.h")
        def shadowDst = new File(dst.parentFile, "MarkdownViewShadowNode.h")
        if (shadowSrc.exists()) {
          shadowDst.text = shadowSrc.text
        }
        logger.lifecycle("Replaced codegen ComponentDescriptors.h with custom shadow node version")
      }
    }
  }
}
