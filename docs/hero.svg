<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" fill="none" aria-label="react-native-fast-markdown — native markdown viewer and WYSIWYG editor for React Native" role="img" viewBox="0 0 1200 420"><defs><linearGradient id="bg" x1="0" x2="1200" y1="0" y2="420" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#141b33"/></linearGradient><radialGradient id="glowTeal" cx="0" cy="0" r="1" gradientTransform="translate(1050 60) scale(420)" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#2dd4bf" stop-opacity=".16"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></radialGradient><radialGradient id="glowIndigo" cx="0" cy="0" r="1" gradientTransform="translate(180 400) scale(520)" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#6366f1" stop-opacity=".18"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/></radialGradient><linearGradient id="accent" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#818cf8"/></linearGradient><pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.2" fill="#fff" fill-opacity=".045"/></pattern><style>.sans{font-family:ui-sans-serif,-apple-system,&apos;Segoe UI&apos;,Roboto,Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,&apos;SF Mono&apos;,SFMono-Regular,Menlo,Consolas,monospace}</style></defs><rect width="1200" height="420" fill="url(#bg)"/><rect width="1200" height="420" fill="url(#dots)"/><rect width="1200" height="420" fill="url(#glowTeal)"/><rect width="1200" height="420" fill="url(#glowIndigo)"/><text x="72" y="132" fill="#f8fafc" class="sans" font-size="42" font-weight="800" letter-spacing="-1">react-native-<tspan fill="url(#accent)">fast</tspan>-markdown</text><text x="72" y="170" fill="#94a3b8" class="sans" font-size="19">Native markdown viewer &amp; WYSIWYG editor.</text><text x="72" y="196" fill="#94a3b8" class="sans" font-size="19">No WebView. No JS layout. Just native views.</text><g class="sans" font-size="14" font-weight="600"><rect width="112" height="34" x="72" y="222" fill="#0f172a" stroke="#293548" rx="17"/><text x="128" y="244" fill="#7dd3fc" text-anchor="middle">Fabric-first</text><rect width="98" height="34" x="196" y="222" fill="#0f172a" stroke="#293548" rx="17"/><text x="245" y="244" fill="#5eead4" text-anchor="middle">C++ core</text><rect width="152" height="34" x="306" y="222" fill="#0f172a" stroke="#293548" rx="17"/><text x="382" y="244" fill="#c4b5fd" text-anchor="middle">0 dependencies</text><rect width="130" height="34" x="470" y="222" fill="#0f172a" stroke="#293548" rx="17"/><text x="535" y="244" fill="#fda4af" text-anchor="middle">iOS + Android</text></g><g class="sans"><text x="72" y="316" fill="#5eead4" font-size="30" font-weight="800">35 µs</text><text x="72" y="340" fill="#7c8aa5" font-size="14">to parse a feed post</text><text x="252" y="316" fill="#7dd3fc" font-size="30" font-weight="800">5 ms</text><text x="252" y="340" fill="#7c8aa5" font-size="14">to open 160 KB in the editor</text><text x="452" y="316" fill="#c4b5fd" font-size="30" font-weight="800">60 fps</text><text x="452" y="340" fill="#7c8aa5" font-size="14">through a 500-item feed</text></g><g><rect width="228" height="292" x="652" y="64" fill="#0a0f1c" stroke="#1f2a3f" rx="14"/><circle cx="674" cy="86" r="4.5" fill="#f87171"/><circle cx="690" cy="86" r="4.5" fill="#fbbf24"/><circle cx="706" cy="86" r="4.5" fill="#34d399"/><text x="676" y="126" fill="#818cf8" class="mono" font-size="13"># Fast Markdown</text><text x="676" y="150" fill="#64748b" class="mono" font-size="13">Ships <tspan fill="#fbbf24">**bold**</tspan>, <tspan fill="#a5b4fc">*italic*</tspan>,</text><text x="676" y="174" fill="#64748b" class="mono" font-size="13"><tspan fill="#f472b6">`code`</tspan> and <tspan fill="#5eead4">||spoilers||</tspan></text><text x="676" y="198" fill="#64748b" class="mono" font-size="13"><tspan fill="#7dd3fc">[@ali](users://ali)</tspan></text><text x="676" y="222" fill="#94a3b8" class="mono" font-size="13">&gt; quoted blocks</text><text x="676" y="246" fill="#94a3b8" class="mono" font-size="13">- native lists</text><text x="676" y="270" fill="#94a3b8" class="mono" font-size="13">- zero layout shift</text><text x="676" y="294" fill="#f472b6" class="mono" font-size="13">```ts</text><text x="676" y="318" fill="#cbd5e1" class="mono" font-size="13">render(fast)</text><text x="676" y="342" fill="#f472b6" class="mono" font-size="13">```</text></g><g stroke="url(#accent)" stroke-linecap="round" stroke-width="2.5"><path d="M892 210 L928 210"/><path fill="none" d="M919 201 L928 210 L919 219"/></g><g><rect width="228" height="292" x="940" y="64" fill="#f8fafc" rx="14"/><text x="964" y="112" fill="#0f172a" class="sans" font-size="19" font-weight="800">Fast Markdown</text><text x="964" y="144" fill="#334155" class="sans" font-size="13.5">Ships <tspan fill="#0f172a" font-weight="700">bold</tspan>, <tspan font-style="italic">italic</tspan>,</text><rect width="44" height="21" x="962" y="156" fill="#f1f5f9" rx="5"/><text x="968" y="171" fill="#db2777" class="mono" font-size="12.5">code</text><text x="1012" y="171" fill="#334155" class="sans" font-size="13.5">and</text><rect width="66" height="21" x="1042" y="156" fill="#0f172a" rx="6"/><text x="964" y="200" fill="#0ea5e9" class="sans" font-size="13.5" font-weight="600">@ali</text><rect width="3.5" height="24" x="962" y="212" fill="#cbd5e1" rx="1.75"/><text x="976" y="229" fill="#64748b" class="sans" font-size="13.5" font-style="italic">quoted blocks</text><text x="964" y="260" fill="#334155" class="sans" font-size="13.5">• native lists</text><text x="964" y="282" fill="#334155" class="sans" font-size="13.5">• zero layout shift</text><rect width="184" height="40" x="962" y="296" fill="#f1f5f9" rx="8"/><text x="974" y="321" fill="#0f172a" class="mono" font-size="12.5">render(<tspan fill="#0d9488">fast</tspan>)</text></g></svg>